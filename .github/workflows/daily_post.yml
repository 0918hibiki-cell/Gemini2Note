name: Daily Note Post

on:
  schedule:
    - cron: '0 0 * * *' # 日本時間の午前9時に毎日実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install fonts and dependencies
        run: |
          # 💡 スクリーンショットの文字を正しく表示するために日本語フォントをインストール
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          
          # ライブラリのインストール
          npm init -y
          npm install playwright @google/generative-ai
          npx playwright install chromium

      - name: Run posting script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTE_STATE: ${{ secrets.NOTE_STATE }}
        run: node post_to_note.mjs

      - name: Upload Debug Screenshots
        # 💡 成功・失敗に関わらず（always）、すべてのPNG画像を保存します
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          # 💡 アスタリスクを使用して、input_check, final_check, error のすべてを拾います
          path: "*.png"
          retention-days: 5 # 保存期間（任意）
