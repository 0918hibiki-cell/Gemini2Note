name: Daily Note Post

on:
  schedule:
    # 毎日 日本時間の朝7:00 (UTCの22:00) に自動実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動で「Run workflow」ボタンを押せるように残しておく

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 安定版のNode.jsを使用

      - name: Install dependencies
        run: |
          # 💡 npm install の後ろに必要な2つのパッケージ名を直接追記します
          npm install playwright @google/generative-ai
          # Playwrightと必要なブラウザ（Chromium）をインストール
          npx playwright install chromium --with-deps

      - name: Run Article Generation and Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTE_STATE: ${{ secrets.NOTE_STATE }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: node post_to_note.mjs

      # スクリプトが途中でクラッシュした場合（失敗時）のみ実行されるエラー通知
      - name: Send Error Notification
        if: failure()
        run: |
          curl -L -X POST -H "Content-Type: application/json" \
          -d "{\"status\": \"失敗 ❌ (GitHub Actionsのログを確認してください)\", \"title\": \"⚠️ システムエラー発生\"}" \
          ${{ secrets.GAS_WEBHOOK_URL }}
