name: Daily Note Post

on:
  schedule:
    - cron: '0 0 * * *' # 日本時間の午前9時に毎日実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install fonts and dependencies
        run: |
          # 💡 スクリーンショットの文字化け（□）を防ぐために日本語フォントをインストール
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          
          # プロジェクトの初期化と必要ライブラリのインストール
          npm init -y
          npm install playwright @google/generative-ai
          npx playwright install chromium

      - name: Run posting script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTE_STATE: ${{ secrets.NOTE_STATE }}
        run: node post_to_note.mjs

      - name: Upload Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
